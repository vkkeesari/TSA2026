<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting to Community Resource Hub</title>
  <script>
    globalThis.location.replace("index.html");
  </script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: "Inter", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 10% 20%, rgba(94, 139, 111, 0.14), transparent 28%),
        radial-gradient(circle at 84% 14%, rgba(201, 106, 75, 0.10), transparent 24%),
        linear-gradient(180deg, #fcfaf6 0%, #f6f1e8 42%, #efe7db 100%);
      color: #173a2e;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 0.75rem 0.75rem 0;
    }

    .site-header-inner,
    .panel,
    .site-footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      border-radius: 1.5rem;
      border: 1px solid rgba(23, 58, 46, 0.12);
      background: linear-gradient(180deg, rgba(255,255,255,0.78), rgba(255,255,255,0.52));
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .site-header-inner {
      padding: 1rem 1.25rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.9rem;
    }

    .brand-title {
      margin: 0;
      font-size: clamp(2rem, 4vw, 2.6rem);
      line-height: 1;
    }

    .brand-copy p {
      margin: 0.45rem 0 0;
      font-size: 0.95rem;
      color: rgba(23, 58, 46, 0.78);
    }

    .site-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .site-nav a {
      padding: 0.8rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(23, 58, 46, 0.12);
      background: rgba(255,255,255,0.7);
      color: #173a2e;
      text-decoration: none;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    .site-nav a.is-active {
      background: #173a2e;
      color: #fff;
    }

    .panel {
      max-width: 38rem;
      margin: 1rem auto;
      padding: 1.25rem 1.5rem;
      text-align: center;
      flex: 1;
      align-self: center;
    }

    a {
      color: #173a2e;
      font-weight: 700;
    }

    .site-footer {
      padding: 1rem 0.75rem 0.75rem;
    }

    .site-footer-inner {
      padding: 1.25rem;
      background: #173a2e;
      color: #fff;
      text-align: center;
      border: 0;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.12);
    }

    .site-footer-inner a {
      color: #fff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <div class="brand-copy">
        <h1 class="brand-title">Community Resource Hub</h1>
        <p>Redirecting to the homepage</p>
      </div>
      <nav class="site-nav" aria-label="Primary">
        <a href="index.html" class="is-active">Hub</a>
        <a href="navigator.html">Local Navigator</a>
        <a href="faq.html">FAQ</a>
        <a href="references.html">References</a>
      </nav>
    </div>
  </header>
  <main class="panel" aria-live="polite">
    <p>Redirecting to the Community Resource Hub homepage.</p>
    <p>If you are not redirected automatically, open <a href="index.html">index.html</a>.</p>
  </main>
  <footer class="site-footer">
    <div class="site-footer-inner">
      <a href="references.html">Made by CATA TSA</a>
    </div>
  </footer>
</body>
</html>
