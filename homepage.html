<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weddington/Waxhaw Community Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        :root {
            --brick: #8B0000;
            --cream: #F5F5DC;
            --forest: #228B22;
            --ink: #361414;
            --ring-size: 250px;
            --header-height: 88px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            background: var(--cream);
            color: var(--ink);
            font-family: "Inter", sans-serif;
            overflow-x: hidden;
        }

        body {
            background-image: radial-gradient(circle at 25% 20%, rgba(139, 0, 0, 0.08), transparent 40%),
                              radial-gradient(circle at 75% 70%, rgba(139, 0, 0, 0.05), transparent 45%);
        }

        .site-header {
            position: fixed;
            inset: 0 0 auto 0;
            height: var(--header-height);
            z-index: 20;
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.8rem;
            align-content: center;
            padding: 0.8rem 1.2rem;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            background: linear-gradient(to bottom, rgba(245, 245, 220, 0.92), rgba(245, 245, 220, 0.55));
        }

        .brand {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 1rem;
            width: min(1100px, 100%);
            margin: 0 auto;
        }

        .brand h1 {
            margin: 0;
            font-family: "Instrument Serif", serif;
            font-size: clamp(1.5rem, 3.4vw, 2.35rem);
            letter-spacing: 0.03em;
            color: var(--brick);
            line-height: 1;
        }

        .brand p {
            margin: 0;
            font-size: clamp(0.72rem, 1.35vw, 0.93rem);
            text-transform: uppercase;
            letter-spacing: 0.18em;
            opacity: 0.8;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.6rem 1rem;
            width: min(1200px, 100%);
            margin: 0 auto;
        }

        .filter-btn {
            appearance: none;
            border: none;
            background: transparent;
            padding: 0.1rem;
            color: rgba(54, 20, 20, 0.62);
            font-size: clamp(0.68rem, 1.45vw, 0.92rem);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: color 220ms ease, transform 220ms ease;
        }

        .filter-btn:hover,
        .filter-btn.active {
            color: var(--brick);
            transform: translateY(-2px);
        }

        .map-scroller {
            position: relative;
            width: 100%;
        }

        .map-viewport {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .topography-layer,
        .pulse-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .pulse-layer {
            opacity: 0;
        }

        .map-track {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 340vh;
        }

        .resource-label {
            position: absolute;
            transform: translate(-50%, -50%);
            text-align: center;
            line-height: 1.18;
            color: rgba(58, 18, 18, 0.9);
            transition: opacity 280ms ease, color 260ms ease;
            will-change: transform, opacity;
            pointer-events: auto;
        }

        .resource-label a {
            text-decoration: none;
            color: inherit;
        }

        .resource-name {
            margin: 0;
            font-size: clamp(0.9rem, 1.8vw, 1.4rem);
            letter-spacing: 0.03em;
            text-shadow: 0 0 12px rgba(245, 245, 220, 0.82);
        }

        .resource-meta {
            margin: 0.22rem 0 0;
            min-height: 1.2rem;
            font-size: clamp(0.6rem, 1.28vw, 0.82rem);
            letter-spacing: 0.05em;
            opacity: 0;
            color: #3f2020;
        }

        .resource-label.in-focus .resource-name {
            color: var(--forest);
        }

        .resource-label.dimmed {
            opacity: 0.18;
        }

        .resource-label.matching .resource-name {
            animation: namePulse 1.7s ease-in-out infinite;
        }

        .focus-ring {
            position: fixed;
            top: 50%;
            left: 50%;
            width: var(--ring-size);
            aspect-ratio: 1 / 1;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 18;
            pointer-events: none;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            background: radial-gradient(circle, rgba(245, 245, 220, 0.03), rgba(245, 245, 220, 0.16));
            box-shadow: 0 0 0 1px rgba(139, 0, 0, 0.42), 0 0 32px rgba(139, 0, 0, 0.24);
        }

        .focus-caption {
            position: fixed;
            top: calc(50% + (var(--ring-size) / 2) + 0.85rem);
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.66rem;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: rgba(139, 0, 0, 0.68);
            z-index: 19;
            pointer-events: none;
        }

        .scroll-space {
            position: relative;
            height: 560vh;
        }

        .scroll-hint {
            position: fixed;
            right: 1.3rem;
            bottom: 1.2rem;
            z-index: 20;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.22em;
            color: rgba(139, 0, 0, 0.63);
            animation: hintFloat 2.4s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes namePulse {
            0%,
            100% { text-shadow: 0 0 4px rgba(34, 139, 34, 0.2); }
            50% { text-shadow: 0 0 18px rgba(34, 139, 34, 0.78); }
        }

        @keyframes hintFloat {
            0%,
            100% { transform: translateY(0); opacity: 0.56; }
            50% { transform: translateY(-8px); opacity: 1; }
        }

        .chatbot-dock {
            position: fixed;
            right: 1rem;
            bottom: 1rem;
            z-index: 60;
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
            align-items: flex-end;
        }

        .chatbot-toggle-icon {
            width: 58px;
            height: 58px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(23,58,46,0.12);
            background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(246,241,232,0.92));
            box-shadow: 0 14px 34px rgba(15,23,42,0.18);
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #173A2E;
            transition: transform 180ms ease, background 180ms ease, color 180ms ease;
        }

        .chatbot-toggle-icon:hover {
            transform: translateY(-2px);
            background: #173A2E;
            color: #ffffff;
        }

        .chatbot-shell {
            width: min(380px, calc(100vw - 1.5rem));
            overflow: hidden;
            border-radius: 1.4rem;
            background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(246,241,232,0.96));
            border: 1px solid rgba(23,58,46,0.12);
            box-shadow: 0 18px 40px rgba(15,23,42,0.18);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

        .chatbot-messages {
            max-height: 280px;
            overflow-y: auto;
            padding: 0.95rem;
            display: grid;
            gap: 0.65rem;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.26), transparent),
                repeating-linear-gradient(180deg, transparent 0 35px, rgba(23,58,46,0.03) 35px 36px);
        }

        .chat-msg {
            border-radius: 1rem;
            padding: 0.75rem 0.85rem;
            font-size: 0.83rem;
            line-height: 1.45;
        }

        .chat-msg.user {
            margin-left: 2rem;
            background: #173A2E;
            color: #ffffff;
        }

        .chat-msg.bot {
            margin-right: 1.2rem;
            background: rgba(201,106,75,0.92);
            color: #0F172A;
        }

        @media (max-width: 768px) {
            :root {
                --ring-size: 185px;
                --header-height: 116px;
            }

            .site-header {
                padding: 0.65rem 0.8rem;
                gap: 0.55rem;
            }

            .brand {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.22rem;
            }

            .filters {
                justify-content: flex-start;
            }

            .resource-name {
                font-size: clamp(0.85rem, 3.4vw, 1.1rem);
            }

            .resource-meta {
                font-size: clamp(0.54rem, 2.1vw, 0.72rem);
            }

            .scroll-hint {
                right: 0.7rem;
                bottom: 0.8rem;
                letter-spacing: 0.14em;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="brand">
            <h1>Weddington / Waxhaw</h1>
            <p>Community Atlas</p>
        </div>
        <nav class="filters" id="filters" aria-label="Resource filters">
            <button class="filter-btn" type="button" data-filter="Human Services">Human Services</button>
            <button class="filter-btn" type="button" data-filter="Health">Health</button>
            <button class="filter-btn" type="button" data-filter="Arts/History">Arts/History</button>
            <button class="filter-btn" type="button" data-filter="Recreation">Recreation</button>
            <button class="filter-btn" type="button" data-filter="Education">Education</button>
        </nav>
    </header>

    <main class="map-scroller">
        <div class="map-viewport" id="mapViewport">
            <svg class="topography-layer" id="topography" aria-hidden="true"></svg>
            <svg class="pulse-layer" id="topographyPulse" aria-hidden="true"></svg>
            <div class="map-track" id="mapTrack" aria-live="polite"></div>
            <div class="focus-ring" aria-hidden="true"></div>
            <div class="focus-caption">Focus Ring</div>
        </div>
        <div class="scroll-space" id="scrollSpace"></div>
        <div class="scroll-hint" aria-hidden="true">Scroll the map</div>
    </main>

    <aside class="chatbot-dock" aria-label="Community assistant">
        <button id="chatbotToggle" class="chatbot-toggle-icon" type="button" aria-expanded="false" aria-controls="chatbotShell" aria-label="Open community assistant">
            Chat
        </button>
        <div id="chatbotShell" class="chatbot-shell" hidden>
            <div style="padding:0.75rem 1rem;background:#173A2E;color:#fff;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.16em;">Ask about this page or plan a day out</div>
            <div id="chatbotMessages" class="chatbot-messages" aria-live="polite"></div>
            <form id="chatbotForm" style="padding:0.75rem;border-top:1px solid rgba(23,58,46,0.1);display:flex;gap:0.5rem;background:rgba(255,255,255,0.5);" aria-label="Chat input">
                <input id="chatbotInput" style="flex:1;padding:0.5rem 0.75rem;font-size:0.875rem;background:#fff;border:1px solid rgba(23,58,46,0.15);border-radius:0.75rem;" type="text" placeholder="Ask a question..." autocomplete="off" />
                <button style="padding:0.5rem 0.75rem;border-radius:0.75rem;background:#173A2E;color:#fff;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.12em;" type="submit">Send</button>
            </form>
        </div>
    </aside>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
